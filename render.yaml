# Render Blueprint - deploy with "New +" -> "Blueprint" after connecting the repo,
# or create a plain Web Service with runtime=Docker and skip this file.
services:
  - type: web
    name: ttb-label-verifier
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Leave unset to run in free local-OCR mode.
      # Set in the Render dashboard to enable Claude vision.
      - key: ANTHROPIC_API_KEY
        sync: false
